                ],
                correctAnswer: "A"
            },
            {
                id: 37,
                type: "True or False",
                points: 2,
                question: "For Hikvision PoE plug & play function, we need to make sure that the IP camera is in active status or set as the same password of the PoE NVR.",
                options: [
                    { id: "A", text: "True" },
                    { id: "B", text: "False" }
                ],
                correctAnswer: "B"
            },
            {
                id: 38,
                type: "True or False",
                points: 2,
                question: "DNR expert mode supports configuring space DNR and time DNR separately.",
                options: [
                    { id: "A", text: "True" },
                    { id: "B", text: "False" }
                ],
                correctAnswer: "A"
            },
            {
                id: 39,
                type: "True or False",
                points: 2,
                question: "130 dB is called true WDR, which can provide a better imaging performance against the strong backlight.",
                options: [
                    { id: "A", text: "True" },
                    { id: "B", text: "False" }
                ],
                correctAnswer: "A"
            }
        ];

        // State management
        let currentQuestionIndex = 0;
        let userAnswers = Array(examData.length).fill(null);
        let score = 0;
        let timeLeft = 30 * 60; // 30 minutes in seconds
        let timerInterval;

        // DOM elements
        const questionContainer = document.getElementById('question-container');
        const prevBtn = document.getElementById('prev-btn');
        const nextBtn = document.getElementById('next-btn');
        const submitBtn = document.getElementById('submit-btn');
        const progressText = document.getElementById('progress-text');
        const progressBar = document.getElementById('progress-bar');
        const currentScore = document.getElementById('current-score');
        const timer = document.getElementById('timer');
        const resultsContainer = document.getElementById('results-container');
        const finalScore = document.getElementById('final-score');
        const passFailMessage = document.getElementById('pass-fail-message');
        const scoreMessage = document.getElementById('score-message');
        const reviewContainer = document.getElementById('review-container');
        const retryBtn = document.getElementById('retry-btn');

        // Initialize the exam
        function initExam() {
            renderQuestion();
            startTimer();
            updateProgress();
            updateScore();
        }

        // Render the current question
        function renderQuestion() {
            const question = examData[currentQuestionIndex];
            const userAnswer = userAnswers[currentQuestionIndex];
            
            let optionsHTML = '';
            question.options.forEach(option => {
                const isSelected = userAnswer && (
                    Array.isArray(userAnswer) 
                        ? userAnswer.includes(option.id)
                        : userAnswer === option.id
                );
                
                optionsHTML += `
                    <div class="option-item ${isSelected ? 'selected' : ''}" data-option="${option.id}">
                        <span class="option-emphsis">${option.id}.</span>
                        <span class="option-content">${option.text}</span>
                    </div>
                `;
            });

            const questionHTML = `
                <div class="question-item">
                    <div class="question-header">
                        <div class="question-no">Question <span class="emphasis">${question.id}</span>/39</div>
                        <div class="question-type">${question.type} (${question.points} points)</div>
                    </div>
                    <div class="question-title">${question.question}</div>
                    <div class="options-list">
                        ${optionsHTML}
                    </div>
                    <div class="feedback ${userAnswer ? (checkAnswer(currentQuestionIndex) ? 'correct' : 'incorrect') : ''}">
                        ${userAnswer ? (checkAnswer(currentQuestionIndex) ? 'Correct!' : `Incorrect. The right answer is: ${Array.isArray(question.correctAnswer) ? question.correctAnswer.join(', ') : question.correctAnswer}`) : ''}
                    </div>
                </div>
            `;

            questionContainer.innerHTML = questionHTML;

            // Add event listeners to options
            document.querySelectorAll('.option-item').forEach(item => {
                item.addEventListener('click', () => selectOption(item.dataset.option));
            });

            // Update button states
            prevBtn.disabled = currentQuestionIndex === 0;
            nextBtn.disabled = currentQuestionIndex === examData.length - 1;
            
            if (currentQuestionIndex === examData.length - 1) {
                nextBtn.style.display = 'none';
                submitBtn.style.display = 'block';
            } else {
                nextBtn.style.display = 'block';
                submitBtn.style.display = 'none';
            }
        }

        // Select an option
        function selectOption(optionId) {
            const question = examData[currentQuestionIndex];
            
            if (question.type === "Multiple Choice") {
                if (!userAnswers[currentQuestionIndex]) {
                    userAnswers[currentQuestionIndex] = [];
                }
                
                const index = userAnswers[currentQuestionIndex].indexOf(optionId);
                if (index === -1) {
                    userAnswers[currentQuestionIndex].push(optionId);
                } else {
                    userAnswers[currentQuestionIndex].splice(index, 1);
                }
            } else {
                userAnswers[currentQuestionIndex] = optionId;
            }
            
            renderQuestion();
            updateScore();
        }

        // Check if the answer is correct
        function checkAnswer(questionIndex) {
            const question = examData[questionIndex];
            const userAnswer = userAnswers[questionIndex];
            
            if (!userAnswer) return false;
            
            if (Array.isArray(question.correctAnswer)) {
                // For multiple choice questions
                if (!Array.isArray(userAnswer)) return false;
                if (userAnswer.length !== question.correctAnswer.length) return false;
                
                return userAnswer.every(answer => question.correctAnswer.includes(answer)) &&
                       question.correctAnswer.every(answer => userAnswer.includes(answer));
            } else {
                // For single choice and true/false questions
                return userAnswer === question.correctAnswer;
            }
        }

        // Update progress
        function updateProgress() {
            const progress = ((currentQuestionIndex + 1) / examData.length) * 100;
            progressBar.style.width = `${progress}%`;
            progressText.textContent = `${currentQuestionIndex + 1}/${examData.length}`;
        }

        // Update score
        function updateScore() {
            score = 0;
            examData.forEach((question, index) => {
                if (checkAnswer(index)) {
                    score += question.points;
                }
            });
            currentScore.textContent = score;
        }

        // Start timer
        function startTimer() {
            timerInterval = setInterval(() => {
                timeLeft--;
                
                if (timeLeft <= 0) {
                    clearInterval(timerInterval);
                    submitExam();
                }
                
                const minutes = Math.floor(timeLeft / 60);
                const seconds = timeLeft % 60;
                timer.textContent = `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
            }, 1000);
        }

        // Navigate to next question
        function nextQuestion() {
            if (currentQuestionIndex < examData.length - 1) {
                currentQuestionIndex++;
                renderQuestion();
                updateProgress();
            }
        }

        // Navigate to previous question
        function prevQuestion() {
            if (currentQuestionIndex > 0) {
                currentQuestionIndex--;
                renderQuestion();
                updateProgress();
            }
        }

        // Submit exam
        function submitExam() {
            clearInterval(timerInterval);
            
            // Calculate final score
            updateScore();
            
            // Calculate total possible score
            const totalPoints = examData.reduce((total, question) => total + question.points, 0);
            
            // Determine pass/fail (assuming 70% is passing)
            const passingScore = totalPoints * 0.7;
            const passed = score >= passingScore;
            
            // Display results
            finalScore.textContent = `${score}/${totalPoints}`;
            finalScore.className = `score-display ${passed ? 'pass' : 'fail'}`;
            passFailMessage.textContent = passed ? 'Congratulations! You passed the exam.' : 'Sorry, you did not pass the exam.';
            passFailMessage.className = passed ? 'pass' : 'fail';
            scoreMessage.textContent = `You scored ${score} out of ${totalPoints} possible points.`;
            
            // Generate review
            let reviewHTML = '';
            examData.forEach((question, index) => {
                const userAnswer = userAnswers[index];
                const isCorrect = checkAnswer(index);
                
                reviewHTML += `
                    <div class="review-item">
                        <div class="review-question">${index + 1}. ${question.question}</div>
                        <div class="review-answer">
                            Your answer: 
                            <span class="user-answer ${isCorrect ? 'correct' : 'incorrect'}">
                                ${userAnswer ? (Array.isArray(userAnswer) ? userAnswer.join(', ') : userAnswer) : 'Not answered'}
                            </span>
                        </div>
                        <div class="review-answer correct-answer">
                            Correct answer: ${Array.isArray(question.correctAnswer) ? question.correctAnswer.join(', ') : question.correctAnswer}
                        </div>
                    </div>
                `;
            });
            
            reviewContainer.innerHTML += reviewHTML;
            
            // Show results container
            resultsContainer.style.display = 'block';
            questionContainer.style.display = 'none';
            document.querySelector('.exam-info').style.display = 'none';
            document.querySelector('.controls').style.display = 'none';
        }

        // Retry exam
        function retryExam() {
            // Reset state
            currentQuestionIndex = 0;
            userAnswers = Array(examData.length).fill(null);
            score = 0;
            timeLeft = 30 * 60;
            
            // Reset UI
            resultsContainer.style.display = 'none';
            questionContainer.style.display = 'block';
            document.querySelector('.exam-info').style.display = 'flex';
            document.querySelector('.controls').style.display = 'flex';
            
            // Restart exam
            initExam();
        }

        // Event listeners
        prevBtn.addEventListener('click', prevQuestion);
        nextBtn.addEventListener('click', nextQuestion);
        submitBtn.addEventListener('click', submitExam);
        retryBtn.addEventListener('click', retryExam);

        // Initialize the exam
        initExam();
    </script>
</body>
</html>
